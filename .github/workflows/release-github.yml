name: Release On GitHub

on:
  workflow_call:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release On GitHub
    runs-on: ubuntu-latest
    steps:
      - name: Create Release PR
        uses: googleapis/release-please-action@v5.0.0
        id: release
        with:
          token: ${{ secrets.BOT_TOKEN }}
          release-type: node
